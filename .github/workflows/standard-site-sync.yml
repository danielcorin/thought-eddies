name: Sync standard.site documents

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Publish posts to standard.site
        env:
          ATP_IDENTIFIER: danielcorin.com
          ATP_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: npx sequoia publish
