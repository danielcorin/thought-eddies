name: Sync standard.site documents

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync posts to standard.site
        env:
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: python scripts/standard_site.py sync --handle danielcorin.com
